name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: API version matches changelog
        run: |
          API_VER=$(grep -m1 'pub const API_VERSION' src/wasm_api.rs | grep -oE '[0-9]+')
          CHANGELOG_VER=$(grep -m1 'Current version' docs/reference/api_changelog.md | grep -oE '[0-9]+')
          test "$API_VER" = "$CHANGELOG_VER" || { echo "API_VERSION $API_VER != changelog $CHANGELOG_VER"; exit 1; }

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
