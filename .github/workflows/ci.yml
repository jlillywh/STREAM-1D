name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: API version matches changelog
        run: |
          API_VER=$(awk -F'= ' '/pub const API_VERSION/ { gsub(/;/, "", $2); print $2; exit }' src/wasm_api.rs)
          CHANGELOG_VER=$(sed -n 's/^.*Current version: \*\*\([0-9]*\)\*\*.*/\1/p' docs/reference/api_changelog.md | head -1)
          test "$API_VER" = "$CHANGELOG_VER" || { echo "API_VERSION $API_VER != changelog $CHANGELOG_VER"; exit 1; }

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@cargo-llvm-cov

      - name: Run tests with coverage
        run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  reach-mild-oracle:
    name: linked oracle CI (reach_mild + simple_channel + ConSpan mode 4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build stream1d and run linked oracle CI gate
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip maturin
          maturin develop --features python --release
          python3 verification/oracle/scripts/run_oracle_ci.py

  verification-notebook:
    name: verification notebook (headless)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build stream1d and execute verification notebook
        run: python3 scripts/run_verification_notebook.py
